name: Sausage Store Deploy

on:
  push:
    branches:
      - main

env:
  NEXUS_HELM_REPO: https://nexus.cloud-services-engineer.education-services.ru/repository/barantsev-av
  NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
  NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: ${{ secrets.SAUSAGE_STORE_NAMESPACE }}
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  INGRESS_HOST: front-barantsev.2sem.students-projects.ru

jobs:
  build_and_push_to_docker_hub:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Backend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend/
          push: true
          tags: ${{ secrets.DOCKER_USER }}/sausage-backend:latest
          build-args: |
            VERSION=${{ github.sha }}
      - name: Push Frontend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend/
          push: true
          tags: ${{ secrets.DOCKER_USER }}/sausage-frontend:latest
      - name: Push Backend-report to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend-report/
          push: true
          tags: ${{ secrets.DOCKER_USER }}/sausage-backend-report:latest

  add_helm_chart_to_nexus:
    name: Add Helm Chart To Nexus
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0
      - name: Build Helm chart dependencies
        run: helm dependency update ./sausage-store-chart
      - name: Lint Helm chart
        run: helm lint ./sausage-store-chart
      - name: Package Helm chart
        run: helm package ./sausage-store-chart
      - name: Upload Helm chart to Nexus
        run: |
          curl -u "${NEXUS_HELM_REPO_USER}:${NEXUS_HELM_REPO_PASSWORD}" \
            --upload-file sausage-store-0.1.3.tgz \
            "${NEXUS_HELM_REPO}/"

  deploy_helm_chart_to_kubernetes:
    name: Deploy Helm Chart To Kubernetes
    runs-on: ubuntu-latest
    needs: add_helm_chart_to_nexus
    steps:
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${KUBE_CONFIG}" > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Add Nexus Helm repository
        run: |
          helm repo add nexus "${NEXUS_HELM_REPO}" \
            --username "${NEXUS_HELM_REPO_USER}" \
            --password "${NEXUS_HELM_REPO_PASSWORD}"
          helm repo update
      - name: Clean up orphaned resources
        run: |
          kubectl delete job mongodb-init -n "${SAUSAGE_STORE_NAMESPACE}" --ignore-not-found
          kubectl delete job sausage-store-mongodb-init -n "${SAUSAGE_STORE_NAMESPACE}" --ignore-not-found
      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install sausage-store nexus/sausage-store \
            --version 0.1.3 \
            --namespace "${SAUSAGE_STORE_NAMESPACE}" \
            --timeout 5m \
            --set frontend.image="${DOCKER_USER}/sausage-frontend:latest" \
            --set backend.image="${DOCKER_USER}/sausage-backend:latest" \
            --set backend-report.image="${DOCKER_USER}/sausage-backend-report:latest" \
            --set frontend.ingress.host="${INGRESS_HOST}"
      - name: Verify deployment
        run: |
          kubectl get pods,svc,ing -n "${SAUSAGE_STORE_NAMESPACE}"
          kubectl get events -n "${SAUSAGE_STORE_NAMESPACE}" --sort-by='.lastTimestamp' | tail -20
