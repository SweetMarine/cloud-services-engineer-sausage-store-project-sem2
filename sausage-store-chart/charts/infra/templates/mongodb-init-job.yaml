apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
  labels:
    app.kubernetes.io/name: mongodb-init
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    app.kubernetes.io/component: mongodb-init
    app.kubernetes.io/part-of: sausage-store
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongodb-init
          image: {{ .Values.mongodb.image }}
          command:
            - sh
            - -c
            - |
              set -e
              MONGO_HOST="mongodb-0.mongodb.{{ .Release.Namespace }}.svc.cluster.local"
              TRIES=0
              MAX_TRIES=60
              until mongosh "mongodb://${MONGO_HOST}:27017/admin" \
                -u "$MONGO_INITDB_ROOT_USERNAME" \
                -p "$MONGO_INITDB_ROOT_PASSWORD" \
                --eval "db.adminCommand('ping')" --quiet; do
                TRIES=$((TRIES + 1))
                if [ "$TRIES" -ge "$MAX_TRIES" ]; then
                  echo "MongoDB not ready after ${MAX_TRIES} attempts"
                  exit 1
                fi
                echo "Waiting for MongoDB (${TRIES}/${MAX_TRIES})..."
                sleep 5
              done
              mongosh "mongodb://${MONGO_HOST}:27017/admin" \
                -u "$MONGO_INITDB_ROOT_USERNAME" \
                -p "$MONGO_INITDB_ROOT_PASSWORD" \
                --eval "
                  db = db.getSiblingDB('sausage-store');
                  try {
                    db.getUser('reports');
                    print('User reports already exists');
                  } catch (e) {
                    db.createUser({
                      user: 'reports',
                      pwd: 'reportspassword',
                      roles: [{ role: 'readWrite', db: 'sausage-store' }]
                    });
                    print('User reports created');
                  }
                " --quiet
          envFrom:
            - configMapRef:
                name: mongodb-conf
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
