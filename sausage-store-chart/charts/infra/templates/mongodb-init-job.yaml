apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: mongodb-init
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    app.kubernetes.io/component: mongodb-init
    app.kubernetes.io/part-of: sausage-store
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongodb-init
          image: {{ .Values.mongodb.image }}
          command:
            - sh
            - -c
            - |
              set -e
              TRIES=0
              until mongosh --host mongodb -u "$MONGO_INITDB_ROOT_USERNAME" -p "$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand('ping')" --quiet; do
                TRIES=$((TRIES + 1))
                if [ "$TRIES" -ge 30 ]; then
                  echo "MongoDB not ready"
                  exit 1
                fi
                echo "Waiting for MongoDB..."
                sleep 10
              done
              mongosh --host mongodb -u "$MONGO_INITDB_ROOT_USERNAME" -p "$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "
                db = db.getSiblingDB('sausage-store');
                try {
                  db.getUser('reports');
                } catch (e) {
                  db.createUser({
                    user: 'reports',
                    pwd: 'reportspassword',
                    roles: [{ role: 'readWrite', db: 'sausage-store' }]
                  });
                }
              " --quiet
          envFrom:
            - configMapRef:
                name: mongodb-conf
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
